<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تحويل الصور الشخصية بالذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f19; color: #fff; }
        .neon-box { border: 2px solid #00f2fe; box-shadow: 0 0 25px rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-xl w-full bg-[#131c2e] border border-slate-700 rounded-3xl p-6 sm:p-8 shadow-2xl text-center">
        <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-[#00f2fe] to-[#ff007f]">محول الأنمي والرسومات الذكية</h1>
        <p class="text-slate-400 text-sm mb-6">ارفع صورتك واختر نمط الرسم للحصول على نتيجة احترافية</p>

        <div class="mb-6 text-right">
            <label class="block text-sm font-bold text-slate-300 mb-2">اختر نمط الرسم:</label>
            <select id="art-style" class="w-full bg-[#0b0f19] border border-slate-700 rounded-xl p-3 text-white font-semibold focus:border-[#00f2fe] outline-none">
                <option value="ghibli">استوديو غيبلي (أنمي ياباني)</option>
                <option value="cyberpunk">سايبربانك (حديث)</option>
                <option value="sketch">رسم فني دقيق</option>
            </select>
        </div>

        <label for="image-upload" class="border-2 border-dashed border-slate-600 hover:border-[#00f2fe] rounded-2xl p-6 cursor-pointer flex flex-col items-center justify-center bg-[#0b0f19]/50 transition-all mb-6 block">
            <svg class="w-12 h-12 text-[#00f2fe] mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <span id="file-label" class="text-sm font-bold text-slate-300">اضغط لاختيار صورتك الشخصية</span>
            <input type="file" id="image-upload" class="hidden" accept="image/*">
        </label>

        <button id="convert-btn" class="w-full py-4 rounded-xl bg-gradient-to-r from-[#00f2fe] to-[#ff007f] text-[#0b0f19] font-black text-lg shadow-lg hover:opacity-90 transition-transform hover:scale-[1.02] mb-6 disabled:opacity-50" disabled>
            بدء المعالجة عبر السيرفر 🎨
        </button>

        <div id="loading-box" class="hidden mb-6 text-center">
            <p class="text-[#00f2fe] font-bold animate-pulse">جاري إرسال الصورة ومعالجتها عبر سيرفر الذكاء الاصطناعي...</p>
        </div>

        <div id="result-box" class="hidden border-t border-slate-700 pt-6">
            <h3 class="text-lg font-bold mb-3 text-[#ff007f]">النتيجة النهائية:</h3>
            <div class="relative overflow-hidden rounded-2xl neon-box inline-block bg-[#0b0f19] mb-4">
                <img id="result-img" class="max-w-full h-auto block rounded-xl" alt="Result">
            </div>
            <div>
                <a id="download-btn" class="inline-block px-6 py-2.5 rounded-xl border border-[#00f2fe] text-[#00f2fe] font-bold hover:bg-[#00f2fe] hover:text-[#0b0f19] transition-colors text-sm">
                    تحميل الصورة 📥
                </a>
            </div>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('image-upload');
        const fileLabel = document.getElementById('file-label');
        const convertBtn = document.getElementById('convert-btn');
        const loadingBox = document.getElementById('loading-box');
        const resultBox = document.getElementById('result-box');
        const resultImg = document.getElementById('result-img');
        const downloadBtn = document.getElementById('download-btn');
        const artStyle = document.getElementById('art-style');

        let selectedFile = null;

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                fileLabel.textContent = `تم اختيار الصورة: ${file.name}`;
                convertBtn.disabled = false;
            }
        });

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingBox.classList.remove('hidden');
            resultBox.classList.add('hidden');
            convertBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('style', artStyle.value);

            try {
                const response = await fetch('http://127.0.0.1:8000/api/transform', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    resultImg.src = data.anime_image_url;
                    downloadBtn.href = data.anime_image_url;
                    downloadBtn.download = 'ai-art-result.jpg';

                    loadingBox.classList.add('hidden');
                    resultBox.classList.remove('hidden');
                } else {
                    alert('حدث خطأ أثناء المعالجة');
                    loadingBox.classList.add('hidden');
                }
            } catch (error) {
                alert('تعذر الاتصال بالسيرفر المحلي، تأكد أنه لا يزال يعمل.');
                loadingBox.classList.add('hidden');
            } finally {
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
